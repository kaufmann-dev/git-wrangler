name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website dependencies
        run: pnpm install --frozen-lockfile
        working-directory: website

      - name: Go tests
        run: go test ./...

      - name: Go race tests
        run: go test -race ./...

      - name: Go vet
        run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Website type check
        run: pnpm run check
        working-directory: website

      - name: Website build
        run: pnpm run build
        working-directory: website

      - name: Website audit
        run: pnpm audit --audit-level moderate
        working-directory: website

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean

      - name: Release archive smoke check
        run: |
          set -eu
          test -f dist/checksums.txt
          test -n "$(find dist -name '*checksums.txt' -o -name '*.tar.gz' -o -name '*.zip')"
          test -n "$(find dist -path '*git-wrangler*' -type f)"
          test -f completions/git-wrangler.bash
          test -f completions/git-wrangler.zsh
          test -f completions/git-wrangler.fish
          test -n "$(find dist -path '*Casks*git-wrangler*' -type f)"
          test -n "$(find dist -name 'git-wrangler.json' -type f)"

      - name: Whitespace
        run: git diff --check
