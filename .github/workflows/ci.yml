name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go tests
        run: go test ./...

      - name: Go race tests
        run: go test -race ./...

      - name: Go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: unparam
        run: |
          go install mvdan.cc/unparam@latest
          unparam ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean

      - name: Release archive smoke check
        run: |
          set -eu
          test -f dist/checksums.txt
          test -n "$(find dist -name '*checksums.txt' -o -name '*.tar.gz' -o -name '*.zip')"
          test -n "$(find dist -path '*git-wrangler*' -type f)"
          test -f completions/git-wrangler.bash
          test -f completions/git-wrangler.zsh
          test -f completions/git-wrangler.fish
          test -n "$(find dist -path '*Casks*git-wrangler*' -type f)"
          test -n "$(find dist -name 'git-wrangler.json' -type f)"

      - name: Whitespace
        run: git diff --check
