# Path globs purged from Git history by git-wrangler remove-secrets.
# This file is the complete list: remove-secrets purges exactly these globs.
# It ships seeded with sensible defaults. Add your own paths, or delete any
# you do not want purged.

paths = [
  # Environment files and package-manager credentials
  ".env",
  ".env.*",
  ".npmrc",
  ".pypirc",
  ".netrc",
  ".git-credentials",

  # Private keys and certificates
  "*.pem",
  "*.key",
  "*.p12",
  "*.pfx",
  "*.asc",
  "*.gpg",
  "*.crt",
  "*.cer",
  "*.cert",

  # SSH keys
  "id_rsa",
  "id_rsa.pub",
  "id_ed25519",
  "id_ed25519.pub",
  "*_rsa",
  "*_ed25519",

  # Secret and credential blobs
  "secrets.json",
  "credentials.json",
  "*secret*.json",
  "*credential*.json",
  "*.secret",
  "config/credentials.yml.enc",

  # Cloud and container credentials
  ".docker/config.json",
  ".kube/config",
  "kubeconfig",
  ".aws/credentials",
  ".aws/config",
  ".config/gcloud/*",
  "application_default_credentials.json",
  "azureProfile.json",
  "accessTokens.json",
]
